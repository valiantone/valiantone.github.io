base_url = "https://blog.bifunctional.xyz"
title = "Frequently Bayesian"
description = "A blog featuring a variety of digital fundamentals ranging from career to code, data to design."
theme = "astropaper-zola"
compile_sass = true
minify_html = true
build_search_index = true
generate_feeds = true
feed_filenames = ["rss.xml"]
taxonomies = [
  { name = "tags", feed = true, paginate_by = 10 },
]

[markdown.highlighting]
style = "class"
light_theme = "rose-pine-moon"
dark_theme = "kanagawa-wave"

[search]
index_format = "elasticlunr_json"
include_title = true
include_description = true
include_content = true

[extra]
author = "Zubin J"
og_image = "og-default.jpg"
post_per_index = 4
show_back_button = true
light_and_dark_mode = true

